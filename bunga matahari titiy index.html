<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semangat Titiy 🌸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: radial-gradient(ellipse at 50% 40%, #1a2a1a 0%, #080d08 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Playfair Display', serif;
  }
  .glow-bg {
    position: absolute;
    width: 320px; height: 320px;
    background: radial-gradient(ellipse, rgba(255,245,180,0.22) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -62%);
    animation: glowPulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes glowPulse {
    0%,100% { opacity:0.7; transform: translate(-50%,-62%) scale(1); }
    50%      { opacity:1;   transform: translate(-50%,-62%) scale(1.12); }
  }
  .scene {
    position: relative;
    width: 320px;
    height: 420px;
  }
  .bouquet-svg {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 300px;
    filter: drop-shadow(0 0 18px rgba(255,240,160,0.5)) drop-shadow(0 0 40px rgba(255,220,100,0.25));
    animation: bouquetAppear 1s cubic-bezier(.34,1.4,.64,1) forwards, floatSway 5s ease-in-out infinite;
    animation-delay: 0s, 1.2s;
    opacity: 0;
  }
  @keyframes bouquetAppear {
    from { opacity:0; transform: translateX(-50%) scale(0.6) translateY(30px); }
    to   { opacity:1; transform: translateX(-50%) scale(1) translateY(0); }
  }
  @keyframes floatSway {
    0%,100% { transform: translateX(-50%) rotate(-1.5deg) translateY(0); }
    50%      { transform: translateX(-50%) rotate(1.5deg) translateY(-8px); }
  }
  .sparks { position:fixed; inset:0; pointer-events:none; }
  .spark {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: sparkFloat var(--dur) ease-in-out infinite var(--delay);
    left: var(--x); top: var(--y);
    width: var(--sz); height: var(--sz);
    background: var(--col);
  }
  @keyframes sparkFloat {
    0%   { opacity:0; transform:translateY(0) scale(1); }
    25%  { opacity:1; }
    100% { opacity:0; transform:translateY(-110px) scale(0.1); }
  }
  .text-wrap {
    position: relative;
    z-index: 5;
    text-align: center;
    margin-top: 12px;
    opacity: 0;
    animation: textIn 1s ease-out forwards;
    animation-delay: 1.4s;
  }
  .main-text {
    font-size: 2rem;
    font-weight: 700;
    color: #FFE55C;
    animation: tGlow 2.8s ease-in-out infinite;
    animation-delay: 2.5s;
  }
  @keyframes tGlow {
    0%,100% { text-shadow: 0 0 8px rgba(255,230,0,.7), 0 0 22px rgba(255,200,0,.4); }
    50%      { text-shadow: 0 0 18px #ffe000, 0 0 50px rgba(255,210,0,.8), 0 0 90px rgba(255,170,0,.35); }
  }
  .divider {
    width:55px; height:1px;
    background: linear-gradient(to right,transparent,#FFD700,transparent);
    margin: 9px auto; opacity:.45;
  }
  .sub-text {
    font-style: italic;
    font-size: .9rem;
    color: #c8a84b;
    letter-spacing:.05em;
  }
  @keyframes textIn {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>

<script>
const cols = ['#FFD700','#ffb7d5','#d4b0f5','#c8d8ff','#ffffff','#ffc9a8'];
const sparksEl = document.getElementById('sparks');
for (let i = 0; i < 35; i++) {
  const s = document.createElement('div');
  s.className = 'spark';
  const sz = (2 + Math.random() * 4).toFixed(1) + 'px';
  s.style.setProperty('--x', Math.random()*100 + 'vw');
  s.style.setProperty('--y', Math.random()*100 + 'vh');
  s.style.setProperty('--dur', (2.5 + Math.random()*4).toFixed(1) + 's');
  s.style.setProperty('--delay', (Math.random()*6).toFixed(1) + 's');
  s.style.setProperty('--sz', sz);
  s.style.setProperty('--col', cols[Math.floor(Math.random()*cols.length)]);
  sparksEl.appendChild(s);
}
</script>
</body>
</html>
